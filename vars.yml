---

min_ram_mb: 256

packages:
  - httpd
  - mod_ssl

services:
  - httpd
  - firewalld

ssl_cert_dir: /etc/httpd/conf.d/ssl

web_config_files:
  - src: server.key
    dest: /etc/httpd/conf.d/ssl
  - src: server.crt
    dest: /etc/httpd/conf.d/ssl
  - src: ssl.conf
    dest: /etc/httpd/conf.d
  - src: index.html
    dest: /var/www/html

web_service: httpd
